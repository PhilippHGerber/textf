<body>
  <noscript>
    <div style="font-family: sans-serif; padding: 2rem;">
      <h1>Textf - Flutter Text Formatting Widget</h1>
      <p>Textf is a zero-dependency, drop-in replacement for Flutter's <code>Text</code> widget that provides
        markdown-like inline text formatting.</p>
      <h2>Features</h2>
      <ul>
        <li><strong>Bold</strong>, <em>Italic</em>, and <code>Code</code> styling</li>
        <li>Links with URL launching support</li>
        <li>Highlights, ~strikethrough~, and _underline_</li>
        <li>Super^script^ and sub_script_</li>
        <li>Custom widget {placeholders}</li>
      </ul>
      <p>Try the live editor and read the comprehensive documentation on this site. Please enable JavaScript to use the
        interactive Flutter web app.</p>
    </div>
  </noscript>

    position:fixed;inset:0;
    background:#0175C2;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:sans-serif;color:white;z-index:9999;">

    <div style="font-size:16px;opacity:0.85">Flutter Text Formatting Widget</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-loading');
      if (el) el.remove();

      var link = document.createElement('link');
      link.rel = 'manifest';
