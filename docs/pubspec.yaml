name: textf_docs
description: "Documentation app for the textf Flutter package — inline markdown-like text formatting."
publish_to: "none"
version: 0.1.0+1
resolution: workspace

environment:
  sdk: ^3.5.0

dependencies:
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  go_router: ^17.1.0
  textf: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/img/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-VariableFont_wght.ttf
        - asset: assets/fonts/RobotoMono-Italic-VariableFont_wght.ttf
          style: italic
